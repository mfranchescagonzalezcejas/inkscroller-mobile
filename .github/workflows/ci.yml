name: CI

on:
  pull_request:
    branches:
      - develop
      - master
  push:
    branches:
      - develop

jobs:
  # ── Shared setup via reusable steps ──
  analyze:
    name: Analyze code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          cache: true

      - name: Install FVM
        run: dart pub global activate fvm

      - name: Add pub cache to PATH
        run: echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Install FVM-pinned SDK
        run: fvm install

      - name: Install project dependencies
        run: fvm flutter pub get

      - name: Analyze code
        run: fvm flutter analyze

  unit-tests:
    name: Unit tests (core + domain + data + providers)
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          cache: true

      - name: Install FVM
        run: dart pub global activate fvm

      - name: Add pub cache to PATH
        run: echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Install FVM-pinned SDK
        run: fvm install

      - name: Install project dependencies
        run: fvm flutter pub get

      - name: Run unit tests
        run: |
          fvm flutter test \
            test/core/ \
            test/features/*/domain/ \
            test/features/*/data/ \
            test/features/*/presentation/providers/

  ui-tests:
    name: UI tests (pages + widgets) — informational
    runs-on: ubuntu-latest
    needs: analyze
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          cache: true

      - name: Install FVM
        run: dart pub global activate fvm

      - name: Add pub cache to PATH
        run: echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Install FVM-pinned SDK
        run: fvm install

      - name: Install project dependencies
        run: fvm flutter pub get

      - name: Run UI tests
        run: |
          fvm flutter test \
            test/features/*/presentation/pages/ \
            test/features/*/presentation/widgets/
