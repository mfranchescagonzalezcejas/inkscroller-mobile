name: Release (Public)

# Triggered manually or by a tag push.
# Downloads the pre-built pro APK from the private repo release
# and publishes it here with user-facing release notes.
#
# Required secrets:
#   GH_PAT — Personal Access Token with `repo` scope (to read the private repo release)

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (must exist in private repo, e.g. v0.6.0)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  PRIVATE_REPO: mfranchescagonzalezcejas/inkscroller_flutter

jobs:
  publish:
    name: Publish public release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ github.event_name == 'push' && github.ref_name || inputs.tag }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download pro APK from private release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p dist
          gh release download "${{ steps.tag.outputs.tag }}" \
            --repo "$PRIVATE_REPO" \
            --pattern "app-pro-release.apk" \
            --dir dist/

      - name: Generate public release notes
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          # Fetch release body from private repo and strip internal references
          gh release view "$TAG" \
            --repo "$PRIVATE_REPO" \
            --json body \
            --jq '.body' \
          | sed 's/ (TASK-[0-9]\+)//g' \
          | sed 's/ (#[0-9]\+)//g' \
          > release_notes.md

          # Append download instructions
          cat >> release_notes.md << 'EOF'

---

**Requirements:** Android 5.0+ · Enable "Install from unknown sources" before installing.
EOF

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          APK="dist/app-pro-release.apk"

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" "$APK" --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "InkScroller $TAG" \
              --notes-file release_notes.md \
              "$APK"
          fi
