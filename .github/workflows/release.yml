name: Release (Public)

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.6.0)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ github.event_name == 'push' && github.ref_name || inputs.tag }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches pubspec version
        run: |
          TAG_VERSION="${{ steps.tag.outputs.version }}"
          PUBSPEC_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          PUBSPEC_SEMVER="${PUBSPEC_VERSION%%+*}"

          if [ "$PUBSPEC_SEMVER" != "$TAG_VERSION" ]; then
            echo "[ERROR] Tag v$TAG_VERSION does not match pubspec.yaml $PUBSPEC_VERSION"
            exit 1
          fi
          echo "[OK] $TAG_VERSION matches pubspec.yaml $PUBSPEC_VERSION"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          cache: true

      - name: Install FVM
        run: dart pub global activate fvm

      - name: Add pub cache to PATH
        run: echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Install FVM-pinned SDK
        run: fvm install

      - name: Install dependencies
        run: fvm flutter pub get

      - name: Write Firebase dart-defines
        run: |
          mkdir -p .dart-defines
          echo '${{ secrets.FIREBASE_DART_DEFINES_JSON }}' > .dart-defines/firebase.json

      - name: Build pro APK
        run: |
          fvm flutter build apk \
            --flavor pro \
            -t lib/main_pro.dart \
            --dart-define="API_BASE_URL=${{ secrets.API_BASE_URL_PRO }}" \
            --dart-define-from-file=.dart-defines/firebase.json

      - name: Generate release notes
        id: notes
        run: |
          PREVIOUS_TAG=$(git tag --list 'v*' --sort=-version:refname \
            | grep -v "^${{ steps.tag.outputs.tag }}$" | head -1 || true)

          if [ -n "$PREVIOUS_TAG" ]; then
            RANGE="${PREVIOUS_TAG}..${{ steps.tag.outputs.tag }}"
          else
            RANGE="HEAD"
          fi

          FEAT_LINES=$(git log "$RANGE" --pretty=format:"%s" \
            | grep -E '^feat(\([^)]+\))?: ' \
            | sed 's/^feat(\([^)]+\)): //' \
            | sed 's/^feat: //' \
            | sed 's/ (TASK-[0-9]\+)//' \
            | sed 's/^/- /' || true)

          FIX_LINES=$(git log "$RANGE" --pretty=format:"%s" \
            | grep -E '^fix(\([^)]+\))?: ' \
            | sed 's/^fix(\([^)]+\)): //' \
            | sed 's/^fix: //' \
            | sed 's/ (TASK-[0-9]\+)//' \
            | sed 's/^/- /' || true)

          {
            echo "## What's new in ${{ steps.tag.outputs.tag }}"
            echo ""
            if [ -n "$FEAT_LINES" ]; then
              echo "### New"
              echo "$FEAT_LINES"
              echo ""
            fi
            if [ -n "$FIX_LINES" ]; then
              echo "### Fixed"
              echo "$FIX_LINES"
              echo ""
            fi
            if [ -z "$FEAT_LINES" ] && [ -z "$FIX_LINES" ]; then
              echo "Internal improvements and stability fixes."
              echo ""
            fi
            echo "---"
            echo ""
            echo "**Requirements:** Android 5.0+ · Enable \"Install from unknown sources\" before installing."
          } > release_notes.md

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          APK="build/app/outputs/flutter-apk/app-pro-release.apk"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$APK" --clobber
          else
            gh release create "$TAG" \
              --title "InkScroller $TAG" \
              --notes-file release_notes.md \
              "$APK"
          fi
